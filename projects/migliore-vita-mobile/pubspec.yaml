name: migliore_vita_mobile
description: Migliore Vita Photographer App - Offline-First POS for Safari Photography
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^12.1.0

  # State Management
  provider: ^6.2.0

  # Local Database (Offline-First)
  realm: ^1.0.0

  # Secondary cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP Client
  dio: ^5.3.1

  # Network detection
  connectivity_plus: ^5.0.0

  # Camera
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  # File handling
  path_provider: ^2.1.1
  file_picker: ^6.1.1

  # Notifications
  flutter_local_notifications: ^17.1.0

  # Logging
  logger: ^2.2.0

  # UUID generation
  uuid: ^4.2.2

  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  realm_generator: ^1.0.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
